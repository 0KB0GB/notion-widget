<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            background-color: #131722 !important; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
        }
        .tradingview-widget-container {
            width: 100% !important;
            /* 높이를 타이트하게 제한하여 하단 바가 들어설 공간을 제거 */
            height: 46px !important; 
            overflow: hidden !important;
            background-color: #131722 !important;
        }
        /* 트레이딩뷰 위젯 자체의 하단 여백을 강제로 끌어올림 */
        .tradingview-widget-container iframe {
            margin-bottom: -32px !important; 
        }
        .tradingview-widget-copyright {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>
    <div class="tradingview-widget-container">
        <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
        <tv-ticker-tape symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FX_IDC:USDKRW,AMEX:KORU" theme="dark" locale="ko"></tv-ticker-tape>
    </div>
</body>
</html>
