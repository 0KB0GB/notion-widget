<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            background-color: #131722 !important; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
        }
        .tradingview-widget-container {
            position: relative;
            width: 100% !important;
            height: 100% !important;
            background-color: #131722 !important;
            overflow: hidden !important;
        }
        /* 위젯 자체를 위로 살짝 끌어올려 하단 남색 영역을 화면 밖으로 밀어내기 */
        .tradingview-widget-container div {
            margin-top: -2px !important;
        }
        .tradingview-widget-copyright {
            display: none !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body>
    <div class="tradingview-widget-container">
        <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
        <tv-ticker-tape symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FX_IDC:USDKRW,AMEX:KORU" theme="dark" locale="ko"></tv-ticker-tape>
    </div>
</body>
</html>
