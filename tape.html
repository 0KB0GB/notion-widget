<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            background-color: #131722 !important; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
        }
        /* 위젯 전체 레이아웃을 감싸는 박스 설정 */
        .tradingview-widget-container {
            width: 100% !important;
            height: 100% !important;
            background-color: #131722 !important;
        }
        /* 내부 iframe의 높이를 조절하여 하단 영역 강제 컷오프 */
        .tradingview-widget-container iframe {
            height: 46px !important;
        }
        /* 트레이딩뷰 자체 카피라이트 클래스 완전 차단 */
        .tradingview-widget-copyright {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>
    <div class="tradingview-widget-container">
        <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
        <tv-ticker-tape symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FX_IDC:USDKRW,AMEX:KORU" theme="dark" locale="ko"></tv-ticker-tape>
    </div>
</body>
</html>
