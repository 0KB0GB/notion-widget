<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView KR News</title>
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #131722 !important; /* 트레이딩뷰 완벽 다크모드 배경색 */
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none !important;
            /* 노션 내부에서 스크롤이 부드럽게 작동하도록 세팅 */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <!-- 한국어 뉴스 피드 페이지를 다크모드 파라미터와 함께 다이렉트로 박아넣습니다 -->
    <iframe src="https://kr.tradingview.com/news/?theme=dark" allowtransparency="true"></iframe>
</body>
</html>
